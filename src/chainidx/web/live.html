<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>chain-indexer live</title>
    <style>
      :root {
        --bg: #0f1420;
        --panel: #171e2e;
        --line: #26304a;
        --text: #e6ebf5;
        --muted: #8b97b3;
        --accent: #6ea8fe;
        --good: #4ec9a5;
        --warn: #f0a35e;
        --bad: #e06c75;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: var(--bg);
        color: var(--text);
      }
      header {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      header h1 { font-size: 1rem; margin: 0; }
      header a { color: var(--accent); text-decoration: none; }
      header .conn { margin-left: auto; color: var(--muted); }
      main { padding: 1.5rem; max-width: 60rem; margin: 0 auto; }
      .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
      .tile {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0.9rem 1rem;
      }
      .tile .n { font-size: 1.6rem; }
      .tile .l { color: var(--muted); font-size: 0.8rem; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 1rem 1.25rem;
        margin-bottom: 1.25rem;
      }
      h2 { font-size: 0.9rem; color: var(--muted); font-weight: 600; margin: 0 0 0.75rem; }
      #spark { display: flex; align-items: flex-end; gap: 3px; height: 60px; }
      #spark .bar { width: 10px; background: var(--accent); border-radius: 2px 2px 0 0; min-height: 2px; }
      #feed { list-style: none; margin: 0; padding: 0; max-height: 22rem; overflow-y: auto; }
      #feed li { padding: 0.35rem 0.5rem; border-bottom: 1px solid var(--line); }
      #feed li .pill {
        display: inline-block;
        min-width: 7rem;
        color: var(--muted);
      }
      #feed li.block .pill { color: var(--accent); }
      #feed li.pool_registered .pill, #feed li.drep_registered .pill { color: var(--good); }
      #feed li.vote_cast .pill, #feed li.gov_action_proposed .pill { color: var(--warn); }
      #feed li.rollback { background: rgba(224, 108, 117, 0.14); }
      #feed li.rollback .pill { color: var(--bad); }
    </style>
  </head>
  <body>
    <header>
      <h1>chain-indexer <span style="color: var(--muted)">live</span></h1>
      <a href="/">explorer</a>
      <span class="conn" id="conn">connecting...</span>
    </header>
    <main>
      <div class="tiles">
        <div class="tile"><div class="n" id="t-blocks">0</div><div class="l">blocks</div></div>
        <div class="tile"><div class="n" id="t-txs">0</div><div class="l">transactions</div></div>
        <div class="tile"><div class="n" id="t-certs">0</div><div class="l">certs and votes</div></div>
        <div class="tile"><div class="n" id="t-rollbacks">0</div><div class="l">rollbacks</div></div>
      </div>

      <div class="panel">
        <h2>Transactions per recent block</h2>
        <div id="spark"></div>
      </div>

      <div class="panel">
        <h2>Live feed</h2>
        <ul id="feed"></ul>
      </div>
    </main>

    <script>
      const counters = { blocks: 0, txs: 0, certs: 0, rollbacks: 0 };
      const set = (id, v) => (document.getElementById(id).textContent = v);
      const spark = document.getElementById("spark");
      const feed = document.getElementById("feed");
      const conn = document.getElementById("conn");
      const txHistory = [];

      function addBar(count) {
        txHistory.push(count);
        while (txHistory.length > 40) txHistory.shift();
        const max = Math.max(1, ...txHistory);
        spark.innerHTML = txHistory
          .map((c) => `<div class="bar" style="height:${(c / max) * 100}%" title="${c} txs"></div>`)
          .join("");
      }

      function prepend(kind, text) {
        const li = document.createElement("li");
        li.className = kind;
        li.innerHTML = `<span class="pill">${kind}</span> ${text}`;
        feed.prepend(li);
        while (feed.children.length > 100) feed.lastChild.remove();
      }

      function handle(e) {
        if (e.type === "block") {
          counters.blocks += 1;
          counters.txs += e.tx_count;
          set("t-blocks", counters.blocks);
          set("t-txs", counters.txs);
          addBar(e.tx_count);
          prepend("block", `#${e.block_no} slot ${e.slot} (${e.tx_count} txs)`);
        } else if (e.type === "rollback") {
          counters.rollbacks += 1;
          set("t-rollbacks", counters.rollbacks);
          prepend("rollback", `rolled back ${e.count} block(s): ${(e.removed || []).map((h) => h.slice(0, 10)).join(", ")}`);
        } else if (e.type === "pool_registered") {
          counters.certs += 1; set("t-certs", counters.certs);
          prepend("pool_registered", e.pool_id);
        } else if (e.type === "drep_registered") {
          counters.certs += 1; set("t-certs", counters.certs);
          prepend("drep_registered", e.drep_id);
        } else if (e.type === "stake_delegated") {
          counters.certs += 1; set("t-certs", counters.certs);
          prepend("stake_delegated", `${e.stake_address.slice(0, 12)} -> ${e.pool_id.slice(0, 12)}`);
        } else if (e.type === "gov_action_proposed") {
          counters.certs += 1; set("t-certs", counters.certs);
          prepend("gov_action_proposed", `${e.action_type} (${e.gov_action_id.slice(0, 12)})`);
        } else if (e.type === "vote_cast") {
          counters.certs += 1; set("t-certs", counters.certs);
          prepend("vote_cast", `${e.voter_role} voted ${e.vote}`);
        }
      }

      function connect() {
        const ws = new WebSocket(`ws://${location.host}/stream`);
        ws.onopen = () => (conn.textContent = "live");
        ws.onmessage = (m) => handle(JSON.parse(m.data));
        ws.onclose = () => {
          conn.textContent = "reconnecting...";
          setTimeout(connect, 1500);
        };
      }
      connect();
    </script>
  </body>
</html>

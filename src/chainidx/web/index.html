<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>chain-indexer explorer</title>
    <style>
      :root {
        --bg: #0f1420;
        --panel: #171e2e;
        --line: #26304a;
        --text: #e6ebf5;
        --muted: #8b97b3;
        --accent: #6ea8fe;
        --good: #4ec9a5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: var(--bg);
        color: var(--text);
      }
      header {
        display: flex;
        gap: 1rem;
        align-items: center;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        position: sticky;
        top: 0;
      }
      header h1 { font-size: 1rem; margin: 0; }
      header h1 a { color: var(--text); text-decoration: none; }
      header nav { display: flex; gap: 0.75rem; }
      header nav a { color: var(--muted); text-decoration: none; }
      header nav a:hover { color: var(--accent); }
      header .status { color: var(--muted); margin-left: auto; }
      .banner {
        display: flex;
        gap: 1.5rem;
        align-items: center;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0.9rem 1.25rem;
        margin-bottom: 1.25rem;
      }
      .banner .big { font-size: 1.4rem; }
      .bar { flex: 1; height: 8px; background: var(--bg); border-radius: 999px; overflow: hidden; max-width: 20rem; }
      .bar > div { height: 100%; background: var(--accent); }
      .tiles { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
      .tile { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 0.9rem 1rem; }
      .tile .n { font-size: 1.5rem; }
      .tile .l { color: var(--muted); font-size: 0.8rem; }
      .chart rect { fill: var(--accent); }
      .chart rect:hover { fill: var(--good); }
      #search {
        flex: 1;
        max-width: 34rem;
        padding: 0.5rem 0.75rem;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
      }
      main { padding: 1.5rem; max-width: 60rem; margin: 0 auto; }
      h2 { font-size: 1rem; color: var(--muted); font-weight: 600; }
      table { width: 100%; border-collapse: collapse; }
      th, td {
        text-align: left;
        padding: 0.5rem 0.6rem;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }
      th { color: var(--muted); font-weight: 600; }
      td.wrap, th.wrap { white-space: normal; word-break: break-all; }
      a { color: var(--accent); text-decoration: none; cursor: pointer; }
      a:hover { text-decoration: underline; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 1rem 1.25rem;
        margin-bottom: 1.25rem;
        overflow-x: auto;
      }
      .kv { display: grid; grid-template-columns: 10rem 1fr; gap: 0.35rem 1rem; }
      .kv div:nth-child(odd) { color: var(--muted); }
      .kv div:nth-child(even) { word-break: break-all; }
      .lovelace { color: var(--good); }
      .muted { color: var(--muted); }
      .pill {
        display: inline-block;
        padding: 0.05rem 0.5rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.8rem;
      }
      a.pill {
        text-decoration: none;
      }
      a.pill.active {
        color: var(--bg);
        background: var(--accent);
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <header>
      <h1><a href="#/">chain-indexer</a></h1>
      <nav>
        <a href="#/">Blocks</a>
        <a href="#/transactions">Transactions</a>
        <a href="#/mempool">Mempool</a>
        <a href="#/epochs">Epochs</a>
        <a href="#/pools">Pools</a>
        <a href="#/governance">Governance</a>
        <a href="#/certs">Certificates</a>
        <a href="#/withdrawals">Withdrawals</a>
        <a href="#/tokens">Tokens</a>
        <a href="#/analytics">Analytics</a>
      </nav>
      <input id="search" placeholder="Search: block height (e.g. 33), slot:N, block/tx hash, or address" />
      <span class="status" id="status">connecting...</span>
    </header>
    <main id="app">Loading...</main>

    <script>
      const app = document.getElementById("app");
      const statusEl = document.getElementById("status");

      const api = async (path) => {
        const res = await fetch(path);
        if (!res.ok) throw new Error(`${res.status}`);
        return res.json();
      };
      const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      const ada = (l) => (l / 1_000_000).toLocaleString() + " ADA";
      const short = (h) => (h && h.length > 20 ? h.slice(0, 12) + "..." + h.slice(-6) : h);
      // Ids can contain characters that clash with hash routing - a governance
      // action id is "txid#index", and the "#" would otherwise start a new URL
      // fragment. Encoding the id in the href (and decoding it in the router)
      // keeps such ids intact end to end.
      const link = (kind, id, label) =>
        `<a href="#/${kind}/${encodeURIComponent(id)}">${esc(label || id)}</a>`;
      const safeDecode = (s) => {
        try {
          return decodeURIComponent(s);
        } catch {
          return s;
        }
      };

      async function refreshStatus() {
        try {
          const h = await api("/health");
          statusEl.textContent = h.tip_height == null ? "no blocks yet" : `tip #${h.tip_height}`;
        } catch {
          statusEl.textContent = "offline";
        }
      }

      async function networkBanner() {
        try {
          const n = await api("/network");
          if (!n.available || n.current_epoch == null) return "";
          const pct = (n.epoch_progress * 100).toFixed(1);
          return (
            `<div class="banner">` +
            `<div><div class="muted">current epoch</div><div class="big">${n.current_epoch}</div></div>` +
            `<div style="flex:1"><div class="muted">${pct}% complete (slot ${n.slot_in_epoch} / ${n.epoch_length})</div>` +
            `<div class="bar"><div style="width:${pct}%"></div></div></div>` +
            `<div><div class="muted">tip time</div><div>${esc(n.tip_time || "")}</div></div></div>`
          );
        } catch {
          return "";
        }
      }

      // One row per transaction for the recent-transactions tables.
      function txRow(t) {
        return (
          `<tr><td class="wrap">${link("tx", t.tx_id, short(t.tx_id))}</td>` +
          `<td>${link("block", t.block_hash, t.block_no)}</td>` +
          `<td>${t.output_count}</td>` +
          `<td class="lovelace">${ada(t.total_output)}</td>` +
          `<td class="lovelace">${ada(t.fee)}</td></tr>`
        );
      }
      const txTable = (txs) =>
        `<div class="panel"><table>` +
        `<tr><th>Transaction</th><th>Block</th><th>Outputs</th><th>Total out</th><th>Fee</th></tr>` +
        (txs.length ? txs.map(txRow).join("") : `<tr><td colspan="5" class="muted">none</td></tr>`) +
        `</table></div>`;

      async function home() {
        const [blocks, txs] = await Promise.all([
          api("/blocks?limit=15"),
          api("/transactions?limit=10"),
        ]);
        const rows = blocks
          .map(
            (b) =>
              `<tr><td>${link("height", b.block_no, b.block_no)}</td>` +
              `<td>${link("slot", b.slot_no, b.slot_no)}</td>` +
              `<td>${link("block", b.hash, short(b.hash))}</td>` +
              // The tx count links to the block, whose page lists each
              // transaction (and each of those links to its detail).
              `<td>${b.tx_count ? link("block", b.hash, b.tx_count) : 0}</td></tr>`
          )
          .join("");
        app.innerHTML =
          (await networkBanner()) +
          `<h2>Latest blocks</h2><div class="panel"><table>` +
          `<tr><th>Height</th><th>Slot</th><th>Hash</th><th>Txs</th></tr>${rows}</table></div>` +
          `<h2>Latest transactions</h2>${txTable(txs)}`;
      }

      async function transactionsPage() {
        const txs = await api("/transactions?limit=50");
        app.innerHTML = `<h2>Transactions</h2>${txTable(txs)}`;
      }

      async function mempoolPage() {
        const m = await api("/mempool");
        if (!m.available) {
          app.innerHTML =
            `<h2>Mempool</h2><div class="panel muted">` +
            `The mempool is read live from the node and is not available here ` +
            `(the explorer is running without a node connection).</div>`;
          return;
        }
        const pct = m.capacity ? ((m.size_bytes / m.capacity) * 100).toFixed(2) : "0";
        const rows = m.tx_ids.length
          ? m.tx_ids.map((h) => `<tr><td class="wrap">${link("tx", h, h)}</td></tr>`).join("")
          : `<tr><td class="muted">no pending transactions</td></tr>`;
        app.innerHTML =
          `<h2>Mempool</h2><div class="panel"><div class="kv">` +
          `<div>pending transactions</div><div>${m.tx_count}</div>` +
          `<div>size</div><div>${m.size_bytes} / ${m.capacity} bytes (${pct}%)</div>` +
          `<div>snapshot slot</div><div>${m.slot}</div></div></div>` +
          `<h2>Pending transactions</h2><div class="panel"><table>${rows}</table></div>`;
      }

      async function epochsPage() {
        const epochs = await api("/epochs");
        if (!epochs.length) {
          app.innerHTML = `<div class="panel muted">No epoch data yet.</div>`;
          return;
        }
        const rows = epochs
          .map(
            (e) =>
              `<tr><td>${link("epoch", e.epoch_no, e.epoch_no)}</td>` +
              `<td>${e.block_count}</td><td>${e.tx_count}</td>` +
              `<td>${esc(e.start_time || "")}</td></tr>`
          )
          .join("");
        app.innerHTML =
          `<h2>Epochs</h2><div class="panel"><table>` +
          `<tr><th>Epoch</th><th>Blocks</th><th>Txs</th><th>Started</th></tr>${rows}</table></div>`;
      }

      async function poolsPage() {
        const pools = await api("/pools");
        if (!pools.length) {
          app.innerHTML = `<div class="panel muted">No registered pools yet.</div>`;
          return;
        }
        const rows = pools
          .map(
            (p) =>
              `<tr><td>${link("pool", p.pool_id, short(p.pool_id))}</td>` +
              `<td>${p.blocks_minted}</td><td>${p.delegators}</td>` +
              `<td>${(p.live_stake * 100).toFixed(2)}%</td>` +
              `<td>${(p.saturation * 100).toFixed(1)}%</td>` +
              `<td>${(p.margin * 100).toFixed(1)}%</td></tr>`
          )
          .join("");
        app.innerHTML =
          `<h2>Stake pools</h2><div class="panel"><table>` +
          `<tr><th>Pool</th><th>Blocks</th><th>Delegators</th><th>Live stake</th>` +
          `<th>Saturation</th><th>Margin</th></tr>` +
          `${rows}</table></div>`;
      }

      function tokensTabs(active) {
        const tab = (id, label) =>
          `<a class="pill${id === active ? " active" : ""}" href="#/tokens${id ? "/" + id : ""}">${label}</a>`;
        return `<div class="panel" style="display:flex;gap:.4rem">${tab("", "Tokens")}${tab("mints", "Mint Transactions")}</div>`;
      }

      async function tokensPage(tab) {
        if (tab === "mints") return mintsPage();
        const assets = await api("/assets");
        const rows = assets.length
          ? assets
              .map(
                (a) =>
                  `<tr><td class="wrap">${link("asset/" + a.policy_id, a.asset_name, esc(a.asset_name) || "(no name)")}</td>` +
                  `<td class="wrap">${link("policy", a.policy_id, short(a.policy_id))}</td><td>${a.quantity}</td></tr>`
              )
              .join("")
          : `<tr><td colspan="3" class="muted">No native tokens in circulation.</td></tr>`;
        app.innerHTML =
          `<h2>Tokens</h2>${tokensTabs("")}` +
          `<div class="panel"><table>` +
          `<tr><th>Asset</th><th>Policy</th><th>Quantity</th></tr>${rows}</table></div>`;
      }

      async function mintsPage() {
        const mints = await api("/assets/mints?limit=50");
        const rows = mints.length
          ? mints
              .map((m) => {
                const label = m.asset_name_text || m.asset_name || "(no name)";
                const qty = m.quantity > 0 ? `+${m.quantity}` : `${m.quantity}`;
                return (
                  `<tr><td class="wrap">${link("asset/" + m.policy_id, m.asset_name, esc(label))}</td>` +
                  `<td class="wrap">${link("policy", m.policy_id, short(m.policy_id))}</td>` +
                  `<td>${qty}</td>` +
                  `<td class="wrap">${link("tx", m.tx_hash, short(m.tx_hash))}</td></tr>`
                );
              })
              .join("")
          : `<tr><td colspan="4" class="muted">No mint transactions yet.</td></tr>`;
        app.innerHTML =
          `<h2>Tokens</h2>${tokensTabs("mints")}` +
          `<div class="panel"><table>` +
          `<tr><th>Asset</th><th>Policy</th><th>Quantity</th><th>Transaction</th></tr>${rows}</table></div>`;
      }

      async function assetPage(policyId, assetName) {
        const a = await api(`/assets/${policyId}/${assetName}`);
        const name = a.asset_name_text
          ? `${esc(a.asset_name_text)} <span class="muted">(${esc(a.asset_name)})</span>`
          : esc(a.asset_name) || "(no name)";
        let metaPanel = "";
        if (a.metadata) {
          const rows = Object.entries(a.metadata)
            .map(([k, v]) => {
              const val =
                typeof v === "object" ? `<pre style="margin:0;white-space:pre-wrap">${esc(JSON.stringify(v, null, 2))}</pre>` : esc(String(v));
              return `<tr><td>${esc(k)}</td><td class="wrap">${val}</td></tr>`;
            })
            .join("");
          metaPanel =
            `<h2>Metadata (${esc(a.metadata_standard || "")})</h2><div class="panel"><table>` +
            `<tr><th>Field</th><th>Value</th></tr>${rows}</table></div>`;
        }
        app.innerHTML =
          `<h2>Asset</h2><div class="panel"><div class="kv">` +
          `<div>name</div><div class="wrap">${name}</div>` +
          `<div>policy</div><div class="wrap">${link("policy", a.policy_id, a.policy_id)}</div>` +
          `<div>quantity</div><div>${a.quantity}</div>` +
          `<div>holders</div><div>${a.holders}</div></div></div>` +
          metaPanel;
      }

      async function policyPage(policyId) {
        const p = await api(`/policies/${policyId}`);
        const rows = p.assets
          .map((a) => {
            const label = a.asset_name_text || a.asset_name || "(no name)";
            return (
              `<tr><td class="wrap">${link("asset/" + p.policy_id, a.asset_name, esc(label))}</td>` +
              `<td>${a.quantity}</td><td>${a.holders}</td></tr>`
            );
          })
          .join("");
        app.innerHTML =
          `<h2>Minting policy</h2><div class="panel"><div class="kv">` +
          `<div>policy id</div><div class="wrap">${esc(p.policy_id)}</div>` +
          `<div>assets</div><div>${p.asset_count}</div></div></div>` +
          `<h2>Assets under this policy</h2><div class="panel"><table>` +
          `<tr><th>Asset</th><th>Quantity</th><th>Holders</th></tr>${rows}</table></div>`;
      }

      // A small inline-SVG line/area chart over per-epoch points (oldest first).
      // valueFn picks the series; fmt formats the tooltip value.
      function lineChart(data, valueFn, fmt) {
        if (!data.length) return `<div class="panel muted">no data</div>`;
        const H = 150;
        const W = Math.max(320, data.length * 14);
        const pad = 26;
        const max = Math.max(1, ...data.map(valueFn));
        const x = (i) => pad + (i * (W - pad - 8)) / Math.max(1, data.length - 1);
        const y = (v) => H - 20 - (v / max) * (H - 34);
        const pts = data.map((d, i) => `${x(i).toFixed(1)},${y(valueFn(d)).toFixed(1)}`).join(" ");
        const area = `${x(0).toFixed(1)},${H - 20} ${pts} ${x(data.length - 1).toFixed(1)},${H - 20}`;
        const dots = data
          .map(
            (d, i) =>
              `<circle cx="${x(i).toFixed(1)}" cy="${y(valueFn(d)).toFixed(1)}" r="2" fill="var(--accent)">` +
              `<title>epoch ${d.epoch_no}: ${fmt(valueFn(d))}</title></circle>`
          )
          .join("");
        return (
          `<div class="panel" style="overflow-x:auto">` +
          `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">` +
          `<polygon points="${area}" fill="var(--accent)" opacity="0.12"></polygon>` +
          `<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="1.5"></polyline>` +
          `${dots}</svg></div>`
        );
      }

      async function analyticsPage() {
        const [s, series, topAddr, topAcct] = await Promise.all([
          api("/analytics/summary"),
          api("/analytics/timeseries?limit=40"),
          api("/top/addresses?limit=10"),
          api("/top/accounts?limit=10"),
        ]);
        const tiles = [
          ["blocks", s.total_blocks],
          ["transactions", s.total_transactions],
          ["active pools", s.active_pools],
          ["DReps", s.dreps],
          ["gov actions", s.governance_actions],
        ]
          .map(([l, n]) => `<div class="tile"><div class="n">${n}</div><div class="l">${l}</div></div>`)
          .join("");
        // Time series come newest-first; charts read oldest to newest.
        const data = series.slice().reverse();
        const txChart = lineChart(data, (d) => d.tx_count, (v) => `${v} txs`);
        const blockChart = lineChart(data, (d) => d.block_count, (v) => `${v} blocks`);
        const feeChart = lineChart(data, (d) => d.fee_total, (v) => ada(v));
        const addrRows = topAddr.length
          ? topAddr
              .map(
                (a) =>
                  `<tr><td class="wrap">${link("address", a.address, short(a.address))}</td>` +
                  `<td class="lovelace">${ada(a.balance)}</td></tr>`
              )
              .join("")
          : `<tr><td colspan="2" class="muted">no addresses</td></tr>`;
        const acctRows = topAcct.length
          ? topAcct
              .map(
                (a) =>
                  `<tr><td class="wrap">${link("account", a.stake_address, short(a.stake_address))}</td>` +
                  `<td class="lovelace">${ada(a.controlled_stake)}</td></tr>`
              )
              .join("")
          : `<tr><td colspan="2" class="muted">no staking accounts</td></tr>`;
        app.innerHTML =
          `<h2>Network</h2><div class="tiles">${tiles}</div>` +
          `<h2>Transactions per epoch</h2>${txChart}` +
          `<h2>Blocks per epoch</h2>${blockChart}` +
          `<h2>Fees per epoch</h2>${feeChart}` +
          `<h2>Top addresses</h2><div class="panel"><table>` +
          `<tr><th>Address</th><th>Balance</th></tr>${addrRows}</table></div>` +
          `<h2>Top staking accounts</h2><div class="panel"><table>` +
          `<tr><th>Stake account</th><th>Controlled stake</th></tr>${acctRows}</table></div>`;
      }

      async function accountPage(id) {
        const a = await api(`/accounts/${id}`);
        app.innerHTML =
          `<h2>Stake account</h2><div class="panel"><div class="kv">` +
          `<div>stake address</div><div>${esc(a.stake_address)}</div>` +
          `<div>registered</div><div>${a.registered}</div>` +
          `<div>delegated to</div><div>${a.delegated_to ? link("pool", a.delegated_to, short(a.delegated_to)) : "<span class='muted'>-</span>"}</div>` +
          `<div>controlled stake</div><div class="lovelace">${ada(a.controlled_stake || 0)}</div>` +
          `<div>rewards</div><div class="lovelace">${ada(a.reward)}</div>` +
          `</div></div>`;
      }

      async function governancePage() {
        const [actions, dreps] = await Promise.all([
          api("/governance/actions"),
          api("/governance/dreps"),
        ]);
        const actionRows = actions.length
          ? actions
              .map(
                (a) =>
                  `<tr><td class="wrap">${link("gov", a.gov_action_id, short(a.gov_action_id))}</td>` +
                  `<td>${esc(a.action_type)}</td>` +
                  `<td>${a.tally.yes} / ${a.tally.no} / ${a.tally.abstain}</td></tr>`
              )
              .join("")
          : `<tr><td colspan="3" class="muted">No governance actions on-chain yet.</td></tr>`;
        const drepRows = dreps.length
          ? dreps
              .map(
                (d) =>
                  `<tr><td class="wrap">${link("drep", d.drep_id, short(d.drep_id))}</td>` +
                  `<td class="lovelace">${ada(d.deposit)}</td><td>${d.votes_cast}</td></tr>`
              )
              .join("")
          : `<tr><td colspan="3" class="muted">No DReps registered yet.</td></tr>`;
        app.innerHTML =
          `<div class="panel" style="display:flex;gap:.4rem;flex-wrap:wrap">` +
          `<a class="pill" href="#/committee">Committee</a>` +
          `<a class="pill" href="#/params">Protocol parameters</a>` +
          `<a class="pill" href="#/protocol-updates">Protocol updates</a></div>` +
          `<h2>Governance actions</h2><div class="panel"><table>` +
          `<tr><th>Action</th><th>Type</th><th>Yes / No / Abstain</th></tr>${actionRows}</table></div>` +
          `<h2>Delegated representatives (DReps)</h2><div class="panel"><table>` +
          `<tr><th>DRep</th><th>Deposit</th><th>Votes cast</th></tr>${drepRows}</table></div>`;
      }

      async function protocolUpdatesPage() {
        const actions = await api("/governance/protocol-updates");
        const rows = actions.length
          ? actions
              .map(
                (a) =>
                  `<tr><td class="wrap">${link("gov", a.gov_action_id, short(a.gov_action_id))}</td>` +
                  `<td>${esc(a.action_type)}</td>` +
                  `<td>${a.tally.yes} / ${a.tally.no} / ${a.tally.abstain}</td></tr>`
              )
              .join("")
          : `<tr><td colspan="3" class="muted">No protocol-parameter or hard-fork actions on-chain yet.</td></tr>`;
        app.innerHTML =
          `<h2>Protocol updates</h2><div class="panel muted" style="margin-bottom:.6rem">` +
          `In Conway, protocol changes are governance actions: parameter changes and ` +
          `hard-fork initiations.</div>` +
          `<div class="panel"><table>` +
          `<tr><th>Action</th><th>Type</th><th>Yes / No / Abstain</th></tr>${rows}</table></div>`;
      }

      async function paramsPage() {
        const p = await api("/protocol-parameters");
        const labels = {
          min_fee_a: "Min fee coefficient (a)",
          min_fee_b: "Min fee constant (b)",
          max_block_body_size: "Max block body size",
          max_tx_size: "Max transaction size",
          max_block_header_size: "Max block header size",
          key_deposit: "Stake key deposit",
          pool_deposit: "Pool deposit",
          n_opt: "Target number of pools (k)",
          min_pool_cost: "Min pool cost",
          coins_per_utxo_byte: "Coins per UTxO byte",
        };
        const lovelace = new Set([
          "key_deposit",
          "pool_deposit",
          "min_pool_cost",
          "min_fee_b",
          "coins_per_utxo_byte",
        ]);
        const keys = Object.keys(p);
        const rows = keys.length
          ? keys
              .map((k) => {
                const val = lovelace.has(k) ? ada(p[k]) : String(p[k]);
                return `<tr><td>${esc(labels[k] || k)}</td><td class="wrap">${esc(val)}</td></tr>`;
              })
              .join("")
          : `<tr><td colspan="2" class="muted">No protocol parameters recorded yet (they arrive with the first local-state-query snapshot).</td></tr>`;
        app.innerHTML =
          `<h2>Protocol parameters</h2><div class="panel"><table>` +
          `<tr><th>Parameter</th><th>Value</th></tr>${rows}</table></div>`;
      }

      function committeeStatus(m) {
        return m.resigned ? "<span class='muted'>resigned</span>" : "active";
      }

      async function committeePage() {
        const members = await api("/governance/committee");
        const rows = members.length
          ? members
              .map(
                (m) =>
                  `<tr><td class="wrap">${link("committee", m.cold_credential, short(m.cold_credential))}</td>` +
                  `<td class="wrap">${esc(short(m.hot_credential))}</td>` +
                  `<td>${committeeStatus(m)}</td></tr>`
              )
              .join("")
          : `<tr><td colspan="3" class="muted">No committee members on-chain yet.</td></tr>`;
        app.innerHTML =
          `<h2>Constitutional committee</h2><div class="panel"><table>` +
          `<tr><th>Cold credential</th><th>Hot credential</th><th>Status</th></tr>${rows}</table></div>`;
      }

      async function committeeMemberPage(cold) {
        const m = await api(`/governance/committee/${cold}`);
        app.innerHTML =
          `<h2>Committee member</h2><div class="panel"><div class="kv">` +
          `<div>cold credential</div><div class="wrap">${esc(m.cold_credential)}</div>` +
          `<div>hot credential</div><div class="wrap">${esc(m.hot_credential)}</div>` +
          `<div>status</div><div>${committeeStatus(m)}</div></div></div>`;
      }

      async function govDetail(id) {
        const a = await api(`/governance/actions/${encodeURIComponent(id)}`);
        const votes = (a.votes || [])
          .map((v) => {
            // Link each voter to its page: a DRep to its DRep page, an SPO to its
            // pool page, a committee voter to the committee section.
            let voter;
            if (v.voter_role === "DRep") voter = link("drep", v.voter_id, short(v.voter_id));
            else if (v.voter_role === "SPO") voter = link("pool", v.voter_id, short(v.voter_id));
            else voter = `<a href="#/committee">${esc(short(v.voter_id))}</a>`;
            return (
              `<tr><td>${esc(v.voter_role)}</td><td class="wrap">${voter}</td>` +
              `<td>${esc(v.vote)}</td></tr>`
            );
          })
          .join("");
        app.innerHTML =
          `<h2>Governance action</h2><div class="panel"><div class="kv">` +
          `<div>id</div><div>${esc(a.gov_action_id)}</div>` +
          `<div>type</div><div>${esc(a.action_type)}</div>` +
          `<div>deposit</div><div class="lovelace">${ada(a.deposit)}</div>` +
          `<div>tally</div><div>${a.tally.yes} yes / ${a.tally.no} no / ${a.tally.abstain} abstain</div>` +
          `</div></div>` +
          (votes
            ? `<h2>Votes</h2><div class="panel"><table><tr><th>Role</th><th>Voter</th><th>Vote</th></tr>${votes}</table></div>`
            : "");
      }

      // Which detail page a certificate's subject links to, by category.
      function certLinkKind(certType) {
        if (certType.startsWith("Pool")) return "pool";
        if (certType.startsWith("DRep")) return "drep";
        if (
          certType.startsWith("Stake Key") ||
          certType === "Delegation" ||
          certType === "Vote Delegation"
        )
          return "account";
        return null; // committee credentials have no page yet
      }

      async function certificatesPage(filter) {
        const [summary, certs] = await Promise.all([
          api("/certificates/summary"),
          api(`/certificates${filter ? `?cert_type=${encodeURIComponent(filter)}` : ""}`),
        ]);
        const total = summary.reduce((s, c) => s + c.count, 0);
        const cats = [{ cert_type: "All", count: total }].concat(summary);
        const chips = cats
          .map((c) => {
            const active = (c.cert_type === "All" && !filter) || c.cert_type === filter;
            const href = c.cert_type === "All" ? "#/certs" : `#/certs/${encodeURIComponent(c.cert_type)}`;
            return `<a class="pill${active ? " active" : ""}" href="${href}">${esc(c.cert_type)} (${c.count})</a>`;
          })
          .join(" ");
        const rows = certs.length
          ? certs
              .map((c) => {
                const kind = certLinkKind(c.cert_type);
                const subj = kind
                  ? link(kind, c.subject, short(c.subject_display))
                  : `<span class="wrap">${esc(short(c.subject_display))}</span>`;
                return (
                  `<tr><td>${esc(c.cert_type)}</td>` +
                  `<td class="wrap">${subj}</td>` +
                  `<td class="wrap">${esc(c.detail) || "<span class='muted'>-</span>"}</td>` +
                  `<td class="wrap">${link("tx", c.tx_hash, short(c.tx_hash))}</td></tr>`
                );
              })
              .join("")
          : `<tr><td colspan="4" class="muted">No certificates in this category yet.</td></tr>`;
        app.innerHTML =
          `<h2>Certificates</h2>` +
          `<div class="panel" style="display:flex;flex-wrap:wrap;gap:.4rem">${chips}</div>` +
          `<div class="panel"><table>` +
          `<tr><th>Type</th><th>Subject</th><th>Detail</th><th>Transaction</th></tr>${rows}</table></div>`;
      }

      async function withdrawalsPage() {
        const ws = await api("/withdrawals");
        const rows = ws.length
          ? ws
              .map(
                (w) =>
                  `<tr><td class="wrap">${link("account", w.stake_address, short(w.stake_address))}</td>` +
                  `<td class="lovelace">${ada(w.amount)}</td>` +
                  `<td class="wrap">${link("tx", w.tx_hash, short(w.tx_hash))}</td></tr>`
              )
              .join("")
          : `<tr><td colspan="3" class="muted">No reward withdrawals on-chain yet.</td></tr>`;
        app.innerHTML =
          `<h2>Reward withdrawals</h2><div class="panel"><table>` +
          `<tr><th>Reward account</th><th>Amount</th><th>Transaction</th></tr>${rows}</table></div>`;
      }

      async function drepDetail(id) {
        const d = await api(`/governance/dreps/${encodeURIComponent(id)}`);
        const voteRows = (d.votes || [])
          .map(
            (v) =>
              `<tr><td class="wrap">${link("gov", v.gov_action_id, short(v.gov_action_id))}</td>` +
              `<td>${esc(v.action_type)}</td><td>${esc(v.vote)}</td></tr>`
          )
          .join("");
        app.innerHTML =
          `<h2>Delegated representative</h2><div class="panel"><div class="kv">` +
          `<div>DRep id</div><div>${esc(d.drep_id)}</div>` +
          `<div>deposit</div><div class="lovelace">${ada(d.deposit)}</div>` +
          `<div>votes cast</div><div>${d.votes_cast}</div>` +
          `</div></div>` +
          (voteRows
            ? `<h2>Votes</h2><div class="panel"><table>` +
              `<tr><th>Action</th><th>Type</th><th>Vote</th></tr>${voteRows}</table></div>`
            : `<div class="panel muted">This DRep has not voted yet.</div>`);
      }

      async function poolDetail(id) {
        const p = await api(`/pools/${id}`);
        const blocks = (p.recent_blocks || [])
          .map((h) => `<tr><td class="wrap">${link("block", h, h)}</td></tr>`)
          .join("");
        const meta = p.metadata_url
          ? `<a href="${esc(p.metadata_url)}" target="_blank" rel="noopener">${esc(p.metadata_url)}</a>`
          : "<span class='muted'>none</span>";
        const series = p.blocks_by_epoch || [];
        const blocksChart = series.length
          ? `<h2>Blocks per epoch</h2>${lineChart(series, (d) => d.block_count, (v) => `${v} blocks`)}`
          : "";
        app.innerHTML =
          `<h2>Stake pool</h2><div class="panel"><div class="kv">` +
          `<div>pool id</div><div>${esc(p.pool_id)}</div>` +
          `<div>blocks minted</div><div>${p.blocks_minted}</div>` +
          `<div>delegators</div><div>${p.delegators}</div>` +
          `<div>live stake</div><div>${(p.live_stake * 100).toFixed(3)}%</div>` +
          `<div>saturation</div><div>${(p.saturation * 100).toFixed(1)}%</div>` +
          `<div>pledge</div><div class="lovelace">${ada(p.pledge)}</div>` +
          `<div>cost</div><div class="lovelace">${ada(p.cost || 0)}</div>` +
          `<div>margin</div><div>${(p.margin * 100).toFixed(2)}%</div>` +
          `<div>metadata</div><div class="wrap">${meta}</div>` +
          `<div>reward address</div><div>${p.reward_address ? link("account", p.reward_address, p.reward_address) : "-"}</div>` +
          `</div></div>` +
          blocksChart +
          ((p.delegators_list || []).length
            ? `<h2>Delegators</h2><div class="panel"><table>` +
              (p.delegators_list || [])
                .map((d) => `<tr><td class="wrap">${link("account", d, short(d))}</td></tr>`)
                .join("") +
              `</table></div>`
            : "") +
          (blocks ? `<h2>Recent blocks</h2><div class="panel"><table>${blocks}</table></div>` : "");
      }

      async function epochDetail(n) {
        const [e, blocks] = await Promise.all([
          api(`/epochs/${n}`),
          api(`/epochs/${n}/blocks`),
        ]);
        const blockRows = blocks
          .map(
            (b) =>
              `<tr><td>${link("height", b.block_no, b.block_no)}</td>` +
              `<td>${link("slot", b.slot_no, b.slot_no)}</td>` +
              `<td class="wrap">${link("block", b.hash, short(b.hash))}</td>` +
              `<td>${b.tx_count}</td></tr>`
          )
          .join("");
        app.innerHTML =
          `<h2>Epoch ${e.epoch_no}</h2><div class="panel"><div class="kv">` +
          `<div>blocks</div><div>${e.block_count}</div>` +
          `<div>transactions</div><div>${e.tx_count}</div>` +
          `<div>slots</div><div>${e.start_slot} to ${e.end_slot}</div>` +
          `<div>started</div><div>${esc(e.start_time || "-")}</div>` +
          `<div>ended</div><div>${esc(e.end_time || "-")}</div></div></div>` +
          (blockRows
            ? `<h2>Blocks</h2><div class="panel"><table>` +
              `<tr><th>Height</th><th>Slot</th><th>Hash</th><th>Txs</th></tr>${blockRows}</table></div>`
            : "");
      }

      function renderBlock(b) {
        const txs = b.tx_hashes.map((h) => `<tr><td class="wrap">${link("tx", h, h)}</td></tr>`).join("");
        app.innerHTML =
          `<h2>Block #${b.block_no}</h2><div class="panel"><div class="kv">` +
          `<div>height</div><div>${b.block_no}</div>` +
          `<div>epoch</div><div>${b.epoch_no != null ? link("epoch", b.epoch_no, b.epoch_no) : "-"}</div>` +
          `<div>time</div><div>${esc(b.time || "-")}</div>` +
          `<div>minted by</div><div>${b.issuer ? link("pool", b.issuer, short(b.issuer)) : "-"}</div>` +
          `<div>hash</div><div>${esc(b.hash)}</div>` +
          `<div>slot</div><div>${b.slot_no}</div>` +
          `<div>previous</div><div>${b.prev_hash ? link("block", b.prev_hash, b.prev_hash) : "<span class='muted'>origin</span>"}</div>` +
          `<div>transactions</div><div>${b.tx_count}</div></div></div>` +
          (txs ? `<h2>Transactions</h2><div class="panel"><table>${txs}</table></div>` : "");
      }

      const block = async (hash) => renderBlock(await api(`/blocks/${hash}`));
      const byHeight = async (n) => renderBlock(await api(`/blocks/height/${n}`));
      const bySlot = async (n) => renderBlock(await api(`/blocks/slot/${n}`));
      async function byHashOrTx(h) {
        // A 64-char hash could be a block or a transaction. Try block, then tx.
        try {
          renderBlock(await api(`/blocks/${h}`));
        } catch {
          await tx(h, "summary");
        }
      }

      // Render one output/input value cell: lovelace plus any native assets.
      function valueCell(v) {
        const assets = (v.assets || [])
          .map((a) => `<span class="pill">${esc(a.asset_name)} × ${a.quantity}</span>`)
          .join(" ");
        return `<td class="lovelace">${ada(v.lovelace)}</td><td>${assets || "<span class='muted'>-</span>"}</td>`;
      }

      function txSummaryTab(t) {
        const totalOut = t.outputs.reduce((s, o) => s + o.lovelace, 0);
        const certRows = (t.certificates || [])
          .map((c) => {
            const kind = certLinkKind(c.cert_type);
            const subj = kind
              ? link(kind, c.subject, short(c.subject_display))
              : esc(short(c.subject_display));
            return `<tr><td>${esc(c.cert_type)}</td><td class="wrap">${subj}</td><td class="wrap">${esc(c.detail) || "<span class='muted'>-</span>"}</td></tr>`;
          })
          .join("");
        const propRows = (t.proposals || [])
          .map(
            (p) =>
              `<tr><td class="wrap">${link("gov", p.gov_action_id, short(p.gov_action_id))}</td>` +
              `<td>${esc(p.action_type)}</td><td class="lovelace">${ada(p.deposit)}</td></tr>`
          )
          .join("");
        const voteRows = (t.votes || [])
          .map(
            (v) =>
              `<tr><td class="wrap">${link("gov", v.gov_action_id, short(v.gov_action_id))}</td>` +
              `<td>${esc(v.voter_role)}</td><td>${esc(v.vote)}</td></tr>`
          )
          .join("");
        const wdRows = (t.withdrawals || [])
          .map(
            (w) =>
              `<tr><td class="wrap">${link("account", w.stake_address, short(w.stake_address))}</td>` +
              `<td class="lovelace">${ada(w.amount)}</td></tr>`
          )
          .join("");
        return (
          `<div class="panel"><div class="kv">` +
          `<div>id</div><div>${esc(t.tx_id)}</div>` +
          `<div>block</div><div>${link("block", t.block_hash, t.block_hash)}</div>` +
          `<div>fee</div><div class="lovelace">${ada(t.fee)}</div>` +
          `<div>total output</div><div class="lovelace">${ada(totalOut)}</div>` +
          `<div>inputs / outputs</div><div>${t.inputs.length} / ${t.outputs.length}</div></div></div>` +
          (certRows
            ? `<h2>Certificates</h2><div class="panel"><table>` +
              `<tr><th>Type</th><th>Subject</th><th>Detail</th></tr>${certRows}</table></div>`
            : "") +
          (propRows
            ? `<h2>Governance actions</h2><div class="panel"><table>` +
              `<tr><th>Action</th><th>Type</th><th>Deposit</th></tr>${propRows}</table></div>`
            : "") +
          (voteRows
            ? `<h2>Votes</h2><div class="panel"><table>` +
              `<tr><th>Action</th><th>Role</th><th>Vote</th></tr>${voteRows}</table></div>`
            : "") +
          (wdRows
            ? `<h2>Withdrawals</h2><div class="panel"><table>` +
              `<tr><th>Reward account</th><th>Amount</th></tr>${wdRows}</table></div>`
            : "")
        );
      }

      function txUtxoTab(t) {
        const ins = t.inputs.length
          ? t.inputs
              .map((i) => {
                // Only link inputs whose source output we actually indexed.
                const ref = i.resolved
                  ? link("tx", i.tx_id, short(i.tx_id))
                  : `<span class="wrap">${esc(short(i.tx_id))}</span>`;
                const addr = i.resolved
                  ? link("address", i.address, short(i.address))
                  : "<span class='muted'>unknown (genesis/faucet)</span>";
                return `<tr><td class="wrap">${ref}#${i.index}</td><td class="wrap">${addr}</td>${valueCell(i)}</tr>`;
              })
              .join("")
          : `<tr><td colspan="4" class="muted">no inputs</td></tr>`;
        const outs = t.outputs
          .map(
            (o) =>
              `<tr><td class="wrap">${link("address", o.address, short(o.address))}</td>${valueCell(o)}</tr>`
          )
          .join("");
        return (
          `<h2>Inputs</h2><div class="panel"><table>` +
          `<tr><th>Source</th><th>Address</th><th>Value</th><th>Assets</th></tr>${ins}</table></div>` +
          `<h2>Outputs</h2><div class="panel"><table>` +
          `<tr><th>Address</th><th>Value</th><th>Assets</th></tr>${outs}</table></div>`
        );
      }

      function txMetadataTab(t) {
        if (!t.metadata) return `<div class="panel muted">This transaction has no metadata.</div>`;
        const rows = Object.entries(t.metadata)
          .map(
            ([label, value]) =>
              `<tr><td>${esc(label)}</td><td class="wrap"><pre style="margin:0;white-space:pre-wrap">${esc(JSON.stringify(value, null, 2))}</pre></td></tr>`
          )
          .join("");
        return `<div class="panel"><table><tr><th>Label</th><th>Value</th></tr>${rows}</table></div>`;
      }

      async function tx(hash, tab) {
        const t = await api(`/txs/${hash}`);
        const active = ["summary", "utxos", "metadata"].includes(tab) ? tab : "summary";
        const tabLink = (id, label) =>
          `<a class="pill${id === active ? " active" : ""}" href="#/tx/${hash}/${id}">${label}</a>`;
        const body =
          active === "utxos" ? txUtxoTab(t) : active === "metadata" ? txMetadataTab(t) : txSummaryTab(t);
        app.innerHTML =
          `<h2>Transaction</h2>` +
          `<div class="panel" style="display:flex;gap:.4rem">` +
          tabLink("summary", "Summary") +
          tabLink("utxos", "UTXOs") +
          tabLink("metadata", "Metadata") +
          `</div>` +
          body;
      }

      async function address(addr) {
        const a = await api(`/addresses/${addr}`);
        const utxos = a.utxos.length
          ? a.utxos
              .map(
                (o) =>
                  `<tr><td class="lovelace">${ada(o.lovelace)}</td>` +
                  `<td>${o.assets.map((x) => `<span class="pill">${esc(x.asset_name)} × ${x.quantity}</span>`).join(" ") || "<span class='muted'>-</span>"}</td></tr>`
              )
              .join("")
          : `<tr><td class="muted" colspan="2">no unspent outputs</td></tr>`;
        app.innerHTML =
          `<h2>Address</h2><div class="panel"><div class="kv">` +
          `<div>address</div><div>${esc(addr)}</div>` +
          `<div>balance</div><div class="lovelace">${ada(a.balance)}</div></div></div>` +
          `<h2>Unspent outputs</h2><div class="panel"><table>` +
          `<tr><th>Value</th><th>Assets</th></tr>${utxos}</table></div>`;
      }

      async function router() {
        await refreshStatus();
        const parts = location.hash.replace(/^#\/?/, "").split("/").map(safeDecode);
        try {
          if (parts[0] === "block" && parts[1]) await block(parts[1]);
          else if (parts[0] === "epochs") await epochsPage();
          else if (parts[0] === "epoch" && parts[1]) await epochDetail(parts[1]);
          else if (parts[0] === "pools") await poolsPage();
          else if (parts[0] === "pool" && parts[1]) await poolDetail(parts[1]);
          else if (parts[0] === "governance") await governancePage();
          else if (parts[0] === "params") await paramsPage();
          else if (parts[0] === "protocol-updates") await protocolUpdatesPage();
          else if (parts[0] === "committee" && parts[1]) await committeeMemberPage(parts[1]);
          else if (parts[0] === "committee") await committeePage();
          else if (parts[0] === "gov" && parts[1]) await govDetail(parts[1]);
          else if (parts[0] === "certs") await certificatesPage(parts[1] || null);
          else if (parts[0] === "withdrawals") await withdrawalsPage();
          else if (parts[0] === "drep" && parts[1]) await drepDetail(parts[1]);
          else if (parts[0] === "account" && parts[1]) await accountPage(parts[1]);
          else if (parts[0] === "tokens") await tokensPage(parts[1]);
          else if (parts[0] === "asset" && parts[1] && parts[2]) await assetPage(parts[1], parts[2]);
          else if (parts[0] === "policy" && parts[1]) await policyPage(parts[1]);
          else if (parts[0] === "analytics") await analyticsPage();
          else if (parts[0] === "height" && parts[1]) await byHeight(parts[1]);
          else if (parts[0] === "slot" && parts[1]) await bySlot(parts[1]);
          else if (parts[0] === "hash" && parts[1]) await byHashOrTx(parts[1]);
          else if (parts[0] === "transactions") await transactionsPage();
          else if (parts[0] === "mempool") await mempoolPage();
          else if (parts[0] === "tx" && parts[1]) await tx(parts[1], parts[2]);
          else if (parts[0] === "address" && parts[1]) await address(parts[1]);
          else await home();
        } catch (e) {
          app.innerHTML = `<div class="panel">Not found (${esc(e.message)}). <a href="#/">Back home</a>.</div>`;
        }
      }

      document.getElementById("search").addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        const q = e.target.value.trim();
        if (!q) return;
        // Work out what was typed: a plain number is a block height; "slot:N" is
        // a slot; a 64-char hex string is a block or tx hash (resolved by the
        // "hash" route); anything else is treated as an address.
        let route;
        if (/^\d+$/.test(q)) route = `height/${q}`;
        else if (/^slot:\s*\d+$/i.test(q)) route = `slot/${q.split(":")[1].trim()}`;
        else if (/^[0-9a-f]{64}$/i.test(q)) route = `hash/${q}`;
        else if (q.startsWith("pool1")) route = `pool/${q}`;
        else if (q.startsWith("stake")) route = `account/${q}`;
        else route = `address/${q}`;
        location.hash = `#/${route}`;
        e.target.value = "";
      });

      window.addEventListener("hashchange", router);
      router();
    </script>
  </body>
</html>
